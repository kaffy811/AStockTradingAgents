# A generic, single database configuration.
# The real DATABASE_URL is NOT stored here — it is read from
# app.core.config.settings inside alembic/env.py.

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# File-name template for new revision files.
# Produces:  2026_05_31_1430-abc123de_add_foo_column.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for revision timestamps (UTC).
timezone = UTC

# Truncate long slug to keep filenames manageable.
truncate_slug_length = 40

# sys.path to insert for "alembic revision --autogenerate".
# Needed so that "from app.xxx import ..." works inside env.py.
prepend_sys_path = .

# Version table name (default: alembic_version).
# version_table = alembic_version

# version_locations = %(here)s/alembic/versions

# Placeholder URL — overridden at runtime in env.py.
sqlalchemy.url = driver://user:pass@localhost/dbname


# Logging configuration (standard Python logging).
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
