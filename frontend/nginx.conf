# ── TradingAgents Frontend — Nginx Configuration ─────────────────────────────
#
# Responsibilities:
#   1. Serve the Vue SPA (static dist/).
#   2. Support Vue Router history-mode: unknown paths fall back to index.html.
#   3. Reverse-proxy /api/v1/* to the backend FastAPI container.
#
# NOTE on proxy_pass path:
#   proxy_pass http://backend:8000;   ← correct (no trailing path segment)
#   If you add a path here (e.g. http://backend:8000/api/v1) the location prefix
#   is REPLACED and the request becomes /api/v1/api/v1/... — a classic Nginx trap.

server {
    listen 80;
    server_name _;

    # Allow larger request bodies (needed for future file uploads / report data)
    client_max_body_size 20m;

    # Serve static files from the Vue build output
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # All /api/v1/* requests are forwarded to the backend container.
    # "backend" is the Docker Compose service name; Docker's internal DNS
    # resolves it to the backend container's IP automatically.
    location ^~ /api/v1/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable response buffering for SSE / streaming endpoints
        proxy_buffering      off;
        proxy_cache          off;
        add_header           X-Accel-Buffering no;

        # Generous timeouts for long-running LLM analysis requests (~90s+)
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
    }

    # ── Vue SPA — history-mode routing ────────────────────────────────────────
    # Try the exact file, then the directory, then fall back to index.html so
    # that Vue Router can handle the path on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite hashes filenames (e.g. index-CsL7H5ir.js), so long cache TTLs are safe.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
